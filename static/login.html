<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小智伴学 · 学生状态监测系统</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 40%, #1e3a5f 70%, #0f172a 100%);
      overflow: hidden;
    }

    /* 背景装饰 */
    .bg-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      pointer-events: none;
    }
    .bg-orb-1 { width: 500px; height: 500px; background: #3b82f6; top: -150px; right: -100px; }
    .bg-orb-2 { width: 400px; height: 400px; background: #8b5cf6; bottom: -120px; left: -80px; }
    .bg-orb-3 { width: 300px; height: 300px; background: #06b6d4; top: 40%; left: 50%; }

    /* 主卡片 */
    .login-wrapper {
      position: relative;
      z-index: 1;
      width: 420px;
    }

    .login-card {
      background: rgba(255,255,255,0.97);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      padding: 44px 40px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.1);
    }

    .brand {
      text-align: center;
      margin-bottom: 32px;
    }

    .brand-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 16px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      box-shadow: 0 8px 24px rgba(59,130,246,0.3);
    }

    .brand-name {
      font-size: 22px;
      font-weight: 700;
      color: #1e293b;
      letter-spacing: 1px;
    }

    .brand-sub {
      font-size: 13px;
      color: #94a3b8;
      margin-top: 4px;
      font-weight: 400;
    }

    /* 表单 */
    .field {
      margin-bottom: 18px;
    }

    .field label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #475569;
      margin-bottom: 6px;
      letter-spacing: 0.3px;
    }

    .field .input-wrap {
      position: relative;
    }

    .field .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      color: #94a3b8;
      pointer-events: none;
    }

    .field input {
      width: 100%;
      padding: 12px 14px 12px 42px;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      font-size: 15px;
      color: #1e293b;
      outline: none;
      transition: all 0.2s;
      background: #f8fafc;
    }

    .field input:focus {
      border-color: #3b82f6;
      background: #fff;
      box-shadow: 0 0 0 4px rgba(59,130,246,0.08);
    }

    .field input::placeholder {
      color: #cbd5e1;
    }

    .btn-login {
      width: 100%;
      padding: 13px;
      margin-top: 8px;
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 2px;
      box-shadow: 0 4px 14px rgba(59,130,246,0.3);
    }

    .btn-login:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(59,130,246,0.4);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .error-msg {
      text-align: center;
      font-size: 13px;
      color: #ef4444;
      margin-top: 14px;
      display: none;
      padding: 8px 12px;
      background: #fef2f2;
      border-radius: 8px;
    }

    .error-msg.show {
      display: block;
    }

    /* 底部信息 */
    .footer-info {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: rgba(255,255,255,0.35);
    }

    .footer-info span {
      margin: 0 8px;
    }

    /* 入场动画 */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .login-card {
      animation: fadeUp 0.6s ease-out;
    }

    /* 响应式 */
    @media (max-width: 480px) {
      .login-wrapper { width: 92%; }
      .login-card { padding: 32px 24px; }
    }
  </style>
</head>
<body>

  <!-- 背景光晕 -->
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div class="bg-orb bg-orb-3"></div>

  <!-- 登录卡片 -->
  <div class="login-wrapper">
    <div class="login-card">
      <div class="brand">
        <div class="brand-icon">🎓</div>
        <div class="brand-name">小智伴学</div>
        <div class="brand-sub">学生状态监测系统</div>
      </div>

      <form id="loginForm">
        <div class="field">
          <label>用户名</label>
          <div class="input-wrap">
            <span class="input-icon">👤</span>
            <input type="text" id="username" required autofocus placeholder="请输入用户名">
          </div>
        </div>

        <div class="field">
          <label>密码</label>
          <div class="input-wrap">
            <span class="input-icon">🔒</span>
            <input type="password" id="password" required placeholder="请输入密码">
          </div>
        </div>

        <button type="submit" class="btn-login">登 录</button>

        <div class="error-msg" id="errorMsg">用户名或密码错误，请重试</div>
      </form>
    </div>

    <div class="footer-info">
      <span>Student Monitor</span>
      <span>·</span>
      <span>v1.0</span>
    </div>
  </div>

  <script>
    if (localStorage.getItem('token')) {
      window.location.href = '/static/dashboard.html';
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errEl = document.getElementById('errorMsg');
      errEl.classList.remove('show');

      const resp = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('username').value,
          password: document.getElementById('password').value
        })
      });

      if (resp.ok) {
        const data = await resp.json();
        localStorage.setItem('token', data.access_token);
        window.location.href = '/static/dashboard.html';
      } else {
        errEl.classList.add('show');
      }
    });
  </script>
</body>
</html>
