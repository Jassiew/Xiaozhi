<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>小智伴学 · 时段详情</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #f8fafc; color: #1e293b; font-size: 14px; }
    .topbar { height: 48px; background: #fff; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; font-size: 14px; }
    .topbar a { color: #3b82f6; text-decoration: none; }
    .topbar a:hover { text-decoration: underline; }
    .container { max-width: 1100px; margin: 0 auto; padding: 24px 20px; }
    .page-header { margin-bottom: 20px; }
    .page-header h1 { font-size: 20px; font-weight: 600; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .page-header .meta { font-size: 13px; color: #64748b; margin-top: 4px; }

    /* Status badges */
    .badge { display: inline-block; padding: 2px 10px; border-radius: 10px; font-size: 12px; font-weight: 500; }
    .badge-away { background: #fee2e2; color: #dc2626; }
    .badge-active { background: #dcfce7; color: #16a34a; }
    .badge-ended { background: #f1f5f9; color: #64748b; }

    /* Time presets */
    .preset-bar { margin-bottom: 16px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .preset-bar .plabel { font-size: 13px; font-weight: 600; color: #475569; white-space: nowrap; }
    .preset-bar button { padding: 5px 14px; border-radius: 4px; font-size: 13px; cursor: pointer; border: 1px solid #e2e8f0; background: #fff; color: #475569; transition: all .15s; white-space: nowrap; }
    .preset-bar button:hover { border-color: #3b82f6; color: #3b82f6; }
    .preset-bar button.active { background: #3b82f6; color: #fff; border-color: #3b82f6; }
    .preset-bar .sep { color: #cbd5e1; margin: 0 4px; }
    .preset-bar input { padding: 5px 8px; border: 1px solid #e2e8f0; border-radius: 4px; font-size: 13px; outline: none; width: 150px; }
    .preset-bar input:focus { border-color: #3b82f6; }
    .btn-go { padding: 5px 16px; border-radius: 4px; border: none; font-size: 13px; cursor: pointer; background: #3b82f6; color: #fff; white-space: nowrap; }
    .btn-go:hover { background: #2563eb; }
    .btn-refresh { padding: 5px 16px; border-radius: 4px; border: 1px solid #e2e8f0; font-size: 13px; cursor: pointer; background: #fff; color: #475569; white-space: nowrap; margin-left: auto; transition: all .15s; }
    .btn-refresh.on { background: #16a34a; color: #fff; border-color: #16a34a; }

    .summary-cards { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 20px; }
    .s-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 14px 16px; text-align: center; }
    .s-card .val { font-size: 24px; font-weight: 700; }
    .s-card .lbl { font-size: 12px; color: #64748b; margin-top: 2px; }
    .chart-box { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 16px; margin-bottom: 20px; }
    .chart-box h3 { font-size: 15px; font-weight: 600; margin-bottom: 12px; }
    .chart-wrap { height: 250px; }
    .timeline-box { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 16px; }
    .timeline-box h3 { font-size: 15px; font-weight: 600; margin-bottom: 12px; }
    .tl-track { position: relative; padding-left: 20px; border-left: 2px solid #e2e8f0; margin-left: 8px; max-height: 400px; overflow-y: auto; }
    .tl-item { position: relative; margin-bottom: 12px; }
    .tl-dot { position: absolute; left: -27px; top: 3px; width: 10px; height: 10px; border-radius: 50%; border: 2px solid #fff; }
    .tl-dot.fatigue { background: #dc2626; }
    .tl-dot.distraction { background: #d97706; }
    .tl-dot.difficulty { background: #3b82f6; }
    .tl-time { font-size: 12px; color: #94a3b8; }
    .tl-tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; margin-left: 4px; }
    .tl-tag.fatigue { background: #fee2e2; color: #dc2626; }
    .tl-tag.distraction { background: #fef3c7; color: #d97706; }
    .tl-tag.difficulty { background: #dbeafe; color: #1e40af; }
    .tl-detail { font-size: 12px; color: #94a3b8; margin-left: 4px; }
    .tl-body { display: flex; align-items: flex-start; gap: 10px; margin-top: 4px; }
    .tl-thumb { width: 80px; height: 60px; object-fit: cover; border-radius: 4px; border: 1px solid #e2e8f0; cursor: pointer; transition: transform .15s; }
    .tl-thumb:hover { transform: scale(1.05); }
    .tl-no-thumb { width: 80px; height: 60px; border-radius: 4px; border: 1px dashed #e2e8f0; display: flex; align-items: center; justify-content: center; font-size: 11px; color: #94a3b8; flex-shrink: 0; }
    .load-more { text-align: center; margin-top: 12px; font-size: 13px; color: #3b82f6; cursor: pointer; }
    .load-more:hover { text-decoration: underline; }

    /* Lightbox */
    .lightbox { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,.85); z-index: 1000; align-items: center; justify-content: center; }
    .lightbox.on { display: flex; }
    .lightbox img { max-width: 90vw; max-height: 85vh; border-radius: 6px; }
    .lightbox .lb-close { position: absolute; top: 16px; right: 24px; font-size: 28px; color: #fff; cursor: pointer; }
    .lightbox .lb-info { position: absolute; bottom: 20px; color: #ccc; font-size: 13px; }

    @media (max-width: 768px) {
      .summary-cards { grid-template-columns: repeat(3, 1fr); }
      .preset-bar input { width: 120px; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <a href="/static/dashboard.html">← 返回小智伴学仪表盘</a>
    <button class="btn-refresh" id="autoRefreshBtn" title="切换自动刷新">⏱ 自动刷新: 关</button>
  </div>
  <div class="container">
    <div class="page-header">
      <h1 id="title">时段详情</h1>
      <div class="meta" id="meta"></div>
    </div>

    <!-- Time range presets -->
    <div class="preset-bar">
      <span class="plabel">时间范围</span>
      <button data-min="0" class="active">全部</button>
      <button data-min="5">最近5分钟</button>
      <button data-min="15">最近15分钟</button>
      <button data-min="30">最近30分钟</button>
      <span class="sep">|</span>
      <input type="datetime-local" id="fromInput">
      <span style="font-size:13px;color:#64748b;">至</span>
      <input type="datetime-local" id="toInput">
      <button class="btn-go" id="applyBtn">应用</button>
    </div>

    <div class="summary-cards" id="summaryCards"></div>
    <div class="chart-box" style="display:flex; gap:20px;">
      <div style="flex:1; min-width:0;">
        <h3>指标趋势</h3>
        <div class="chart-wrap"><canvas id="trendChart"></canvas></div>
      </div>
      <div style="width:260px; flex-shrink:0;">
        <h3>状态分布</h3>
        <div class="chart-wrap" style="height:250px;"><canvas id="pieChart"></canvas></div>
      </div>
    </div>
    <div class="timeline-box">
      <h3>事件时间线</h3>
      <div class="tl-track" id="timeline"></div>
      <div class="load-more" id="loadMore" style="display:none;">加载更多...</div>
    </div>
  </div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <span class="lb-close">&times;</span>
    <img id="lbImg" src="" alt="告警截图">
    <span class="lb-info" id="lbInfo"></span>
  </div>

<script>
const token = localStorage.getItem('token');
if (!token) { window.location.href = '/static/login.html'; }

const params = new URLSearchParams(window.location.search);
const sessionId = params.get('id');
let allEvents = [], shownCount = 0, pageSize = 50;
let sessionStart = null, sessionEnd = null;
let sessionStatus = null;
let currentPreset = 0;
let customFrom = null, customTo = null;
let chart = null, pieChart = null;
let autoRefresh = false, refreshTimer = null;

function fmtTime(iso) { return new Date(iso).toLocaleTimeString(); }
function fmtDT(iso) {
  const d = new Date(iso);
  const pad = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function getTimeRange() {
  if (currentPreset === 0) {
    return { fromIso: null, toIso: null };
  } else if (currentPreset > 0) {
    // 最近X分钟：以最后数据时间点为基准，不超过当前时间
    const refTs = sessionEnd ? Math.min(sessionEnd.getTime(), Date.now()) : Date.now();
    const to = new Date(refTs);
    const from = new Date(to.getTime() - currentPreset * 60 * 1000);
    // 不跟 sessionStart 比较——session.start_time 可能晚于实际帧数据时间
    return { fromIso: from.toISOString(), toIso: to.toISOString() };
  } else {
    return { fromIso: customFrom, toIso: customTo };
  }
}

async function loadData(fromIso, toIso) {
  let url = `/api/sessions/${sessionId}?max_points=100`;
  if (fromIso) url += `&from_time=${encodeURIComponent(fromIso)}`;
  if (toIso) url += `&to_time=${encodeURIComponent(toIso)}`;

  const resp = await fetch(url, { headers: {'Authorization': `Bearer ${token}`}, cache: 'no-cache' });
  if (!resp.ok) { document.getElementById('title').textContent = '加载失败'; return; }
  const data = await resp.json();
  if (!data.timeline || !data.timeline.length) { document.getElementById('title').textContent = '暂无数据'; return; }

  sessionStart = new Date(data.start_time);
  sessionEnd = data.end_time ? new Date(data.end_time) : new Date(data.timeline[data.timeline.length - 1].timestamp);
  sessionStatus = data.status;

  // 标题 + 状态徽章
  const awayPct = (data.summary && data.summary.away_pct) || 0;
  const statusBadge = data.status === 'active'
    ? '<span class="badge badge-active">进行中</span>'
    : '<span class="badge badge-ended">已结束</span>';
  const awayBadge = awayPct > 50 ? ' <span class="badge badge-away">人员已离开</span>' : '';

  document.getElementById('title').innerHTML = `设备 ${data.device_id} ${statusBadge}${awayBadge}`;
  document.getElementById('meta').textContent =
    `${new Date(data.start_time).toLocaleString()}${
      data.end_time ? ' · 结束: ' + new Date(data.end_time).toLocaleString() : ''
    } · 共 ${data.total_records} 帧${awayPct > 0 ? ` · 离开占比 ${awayPct}%` : ''}`;

  // Summary cards
  const s = data.summary;
  if (s) {
    allEvents = data.events || [];
    document.getElementById('summaryCards').innerHTML = `
      <div class="s-card"><div class="val">${s.frame_count}</div><div class="lbl">分析帧数</div></div>
      <div class="s-card"><div class="val">${s.avg_fatigue}</div><div class="lbl">平均疲劳度</div></div>
      <div class="s-card"><div class="val">${s.avg_distraction}</div><div class="lbl">平均分心度</div></div>
      <div class="s-card"><div class="val" style="color:#d97706;">${s.max_difficulty}</div><div class="lbl">最高困难度</div></div>
      <div class="s-card"><div class="val" style="color:#dc2626;">${allEvents.length}</div><div class="lbl">异常事件</div></div>
    `;
  }

  // Trend Chart
  const tl = data.timeline;
  if (chart) chart.destroy();
  chart = new Chart(document.getElementById('trendChart'), {
    type: 'line',
    data: {
      labels: tl.map(r => fmtTime(r.timestamp)),
      datasets: [
        { label: '疲劳度', data: tl.map(r => r.fatigue), borderColor: '#3b82f6', backgroundColor: 'rgba(59,130,246,0.04)', tension: 0.2, fill: true },
        { label: '分心度', data: tl.map(r => r.distraction), borderColor: '#f59e0b', backgroundColor: 'rgba(245,158,11,0.04)', tension: 0.2, fill: true },
        { label: '困难度', data: tl.map(r => r.difficulty), borderColor: '#8b5cf6', backgroundColor: 'rgba(139,92,246,0.04)', tension: 0.2, fill: true },
      ]
    },
    options: { responsive: true, maintainAspectRatio: false, scales: { y: { min: 0, max: 1.2 } }, plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 10 } } } } }
  });

  // Pie chart — 状态分布
  const dist = data.state_distribution || {};
  const stateLabels = {
    engaged_screen: '看屏幕', engaged_writing: '写字', engaged_reading: '阅读',
    thinking: '思考', distracted_phone: '玩手机', distracted_away: '分心',
    fatigued: '疲劳', resting: '休息', absent: '离开'
  };
  const stateColors = {
    engaged_screen: '#10b981', engaged_writing: '#34d399', engaged_reading: '#6ee7b7',
    thinking: '#f59e0b', distracted_phone: '#ef4444', distracted_away: '#f97316',
    fatigued: '#dc2626', resting: '#94a3b8', absent: '#cbd5e1'
  };
  const pieLabels = Object.keys(dist).map(k => stateLabels[k] || k);
  const pieValues = Object.values(dist);
  const pieColors = Object.keys(dist).map(k => stateColors[k] || '#64748b');

  if (pieChart) pieChart.destroy();
  pieChart = new Chart(document.getElementById('pieChart'), {
    type: 'doughnut',
    data: {
      labels: pieLabels,
      datasets: [{ data: pieValues, backgroundColor: pieColors, borderWidth: 0 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { position: 'bottom', labels: { boxWidth: 8, font: { size: 10 }, padding: 10 } }
      }
    }
  });

  renderTimeline();
}

function renderTimeline() {
  shownCount = Math.min(shownCount + pageSize, allEvents.length);
  document.getElementById('timeline').innerHTML = allEvents.slice(0, shownCount).map(e => {
    let thumbHtml = '';
    if (e.frame_path) {
      const imgUrl = `/api/frame-image?path=${encodeURIComponent(e.frame_path)}&token=${encodeURIComponent(token)}`;
      thumbHtml = `<img class="tl-thumb" src="${imgUrl}" onclick="event.stopPropagation(); openLightbox('${imgUrl}', '${fmtTime(e.timestamp)} ${e.label}')" loading="lazy">`;
    } else {
      thumbHtml = `<div class="tl-no-thumb">无截图</div>`;
    }
    return `
      <div class="tl-item">
        <div class="tl-dot ${e.type}"></div>
        <span class="tl-time">${fmtTime(e.timestamp)}</span>
        <span class="tl-tag ${e.type}">${e.label}</span>
        <span class="tl-detail">${e.detail}</span>
        <div class="tl-body">${thumbHtml}</div>
      </div>
    `;
  }).join('') || '<div style="font-size:11px;color:#94a3b8;">当前范围内无异常事件</div>';
  document.getElementById('loadMore').style.display = shownCount < allEvents.length ? '' : 'none';
}

function openLightbox(url, info) {
  document.getElementById('lbImg').src = url;
  document.getElementById('lbInfo').textContent = info;
  document.getElementById('lightbox').classList.add('on');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('on');
}

// --- Preset buttons ---
document.querySelectorAll('.preset-bar button[data-min]').forEach(btn => {
  btn.addEventListener('click', function() {
    const min = parseInt(this.dataset.min);
    currentPreset = min;
    customFrom = null; customTo = null;
    document.querySelectorAll('.preset-bar button[data-min]').forEach(b => b.classList.remove('active'));
    this.classList.add('active');

    const { fromIso, toIso } = getTimeRange();
    document.getElementById('fromInput').value = fromIso ? fmtDT(fromIso) : '';
    document.getElementById('toInput').value = toIso ? fmtDT(toIso) : '';
    shownCount = 0;
    loadData(fromIso, toIso);
  });
});

// --- Custom range ---
document.getElementById('applyBtn').addEventListener('click', function() {
  const fromVal = document.getElementById('fromInput').value;
  const toVal = document.getElementById('toInput').value;
  if (!fromVal || !toVal) return;
  const from = new Date(fromVal);
  const to = new Date(toVal);
  if (isNaN(from) || isNaN(to) || from >= to) return;

  currentPreset = -1;
  customFrom = from.toISOString();
  customTo = to.toISOString();
  document.querySelectorAll('.preset-bar button[data-min]').forEach(b => b.classList.remove('active'));
  shownCount = 0;
  loadData(customFrom, customTo);
});

// --- Auto-refresh toggle ---
document.getElementById('autoRefreshBtn').addEventListener('click', function() {
  autoRefresh = !autoRefresh;
  const btn = this;
  if (autoRefresh) {
    btn.textContent = '⏱ 自动刷新: 开';
    btn.classList.add('on');
    refreshTimer = setInterval(doRefresh, 5000);
  } else {
    btn.textContent = '⏱ 自动刷新: 关';
    btn.classList.remove('on');
    if (refreshTimer) { clearInterval(refreshTimer); refreshTimer = null; }
  }
});

function doRefresh() {
  const { fromIso, toIso } = getTimeRange();
  // 更新输入框（滑动窗口时显示最新时间）
  if (currentPreset > 0) {
    document.getElementById('fromInput').value = fromIso ? fmtDT(fromIso) : '';
    document.getElementById('toInput').value = toIso ? fmtDT(toIso) : '';
  }
  shownCount = 0;
  loadData(fromIso, toIso);
}

document.getElementById('loadMore').onclick = renderTimeline;

// 初始加载
loadData(null, null);

// 进行中的时段默认开启自动刷新
setTimeout(() => {
  if (sessionStatus === 'active') document.getElementById('autoRefreshBtn').click();
}, 1000);
</script>
</body>
</html>
